<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>棧板上下貨統計</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
        
        .vehicle-card { transition: all 0.2s; border-left: 5px solid #e5e7eb; }
        .vehicle-card.has-data { border-left-color: #2563eb; background-color: #ffffff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="bg-gray-100 pb-28 font-sans">

    <div class="max-w-md mx-auto p-2">
        <!-- 標題欄 -->
        <div class="bg-white rounded-xl shadow-sm p-3 mb-3 flex justify-between items-center border-b-2 border-blue-500">
            <h1 class="text-base font-bold text-gray-800">🚛 棧板上下貨統計</h1>
            <input type="date" id="global_date" class="bg-gray-50 rounded px-2 py-1 text-xs font-bold text-blue-600 outline-none border border-gray-200">
        </div>

        <!-- 車輛清單 -->
        <div id="vehicle_list" class="space-y-2">
            <!-- JS 生成 -->
        </div>
    </div>

    <!-- 底部固定按鈕 -->
    <div class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-sm border-t p-3 shadow-2xl z-50">
        <div class="max-w-md mx-auto grid grid-cols-2 gap-3">
            <button onclick="copyAll()" class="bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl shadow-lg active:scale-95 transition flex flex-col items-center">
                <span class="text-base font-bold">📋 全部彙整複製</span>
            </button>
            <button onclick="clearAll()" class="bg-white text-gray-400 py-3 rounded-xl active:scale-95 transition flex flex-col items-center border border-gray-200">
                <span class="text-base font-bold">♻️ 全部重置</span>
            </button>
        </div>
    </div>

    <script>
        const vehicles = [
            "3PL 幹線(南車)", "爆量車 1", "爆量車 2", "爆量車 3", 
            "爆量車 4", "爆量車 5", "爆量車 6",
            "ES 幹線車", "ES 爆量車 1", "ES 爆量車 2"
        ];

        window.onload = function() {
            const today = new Date().toLocaleDateString('sv-SE'); 
            document.getElementById('global_date').value = today;
            
            const listContainer = document.getElementById('vehicle_list');
            
            vehicles.forEach((name, index) => {
                const card = document.createElement('div');
                card.id = `card_${index}`;
                card.className = "vehicle-card bg-white rounded-lg p-3 shadow-sm";
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-sm font-black text-gray-800">${name}</span>
                        <button onclick="copySingle(${index})" class="text-[10px] font-bold bg-gray-100 text-gray-400 px-2 py-0.5 rounded border border-gray-200 active:bg-blue-50">單車複製</button>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-2">
                        <!-- 上貨欄位 -->
                        <div class="bg-blue-50 rounded-lg p-1.5 border border-blue-100">
                            <label class="block text-[10px] font-bold text-blue-600 mb-0.5">⬆️ 上貨棧板</label>
                            <input type="number" id="up_${index}" placeholder="0" inputmode="numeric" 
                                oninput="checkData(${index})" 
                                class="w-full bg-transparent text-center font-black text-2xl text-blue-700 outline-none">
                        </div>
                        
                        <!-- 下貨欄位 -->
                        <div class="bg-green-50 rounded-lg p-1.5 border border-green-100">
                            <label class="block text-[10px] font-bold text-green-600 mb-0.5">⬇️ 下貨棧板</label>
                            <input type="number" id="down_${index}" placeholder="0" inputmode="numeric" 
                                oninput="checkData(${index})" 
                                class="w-full bg-transparent text-center font-black text-2xl text-green-700 outline-none">
                        </div>
                    </div>
                    
                    <div class="mt-2">
                        <input type="text" id="note_${index}" placeholder="💡 備註內容..." 
                            oninput="checkData(${index})" 
                            class="w-full text-xs text-gray-500 bg-gray-50 border-none rounded-md outline-none py-1 px-2 focus:ring-1 focus:ring-blue-200">
                    </div>
                `;
                listContainer.appendChild(card);
            });
        };

        function checkData(index) {
            const up = document.getElementById(`up_${index}`).value;
            const down = document.getElementById(`down_${index}`).value;
            const card = document.getElementById(`card_${index}`);
            if (up !== "" || down !== "") {
                card.classList.add('has-data');
            } else {
                card.classList.remove('has-data');
            }
        }

        function formatVehicleText(index) {
            const date = document.getElementById('global_date').value;
            const up = document.getElementById(`up_${index}`).value || '0';
            const down = document.getElementById(`down_${index}`).value || '0';
            const note = document.getElementById(`note_${index}`).value || '無';
            return `【棧板回報】\n📅日期：${date}\n🚚車項：${vehicles[index]}\n⬆️上貨：${up} 棧\n⬇️下貨：${down} 棧\n📝備註：${note}`;
        }

        function copySingle(index) {
            copyToClipboard(formatVehicleText(index), `✅ 已複製 ${vehicles[index]}`);
        }

        function copyAll() {
            const date = document.getElementById('global_date').value;
            let allText = `📢【棧板上下貨統計報表】\n📅日期：${date}\n━━━━━━━━━━━━━━\n`;
            let hasAnyData = false;

            vehicles.forEach((name, index) => {
                const up = document.getElementById(`up_${index}`).value;
                const down = document.getElementById(`down_${index}`).value;
                const note = document.getElementById(`note_${index}`).value || '無';
                if (up !== "" || down !== "") {
                    hasAnyData = true;
                    allText += `📍 ${name}\n   上貨：${up || 0} / 下貨：${down || 0}\n   備註：${note}\n----------------------------\n`;
                }
            });

            if (!hasAnyData) { alert("❌ 請填寫數據"); return; }
            copyToClipboard(allText, "✅ 已複製彙整報表");
        }

        function copyToClipboard(text, msg) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert(msg);
        }

        function clearAll() {
            if(confirm("確定要清空所有內容？")) {
                vehicles.forEach((_, index) => {
                    document.getElementById(`up_${index}`).value = '';
                    document.getElementById(`down_${index}`).value = '';
                    document.getElementById(`note_${index}`).value = '';
                    document.getElementById(`card_${index}`).classList.remove('has-data');
                });
                window.scrollTo({top: 0, behavior: 'smooth'});
            }
        }
    </script>
</body>
</html>
